<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TechForge — Panel Técnico</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0e17;
      --bg-secondary: #111827;
      --bg-tertiary: #1a2332;
      --border-subtle: rgba(148,163,184,0.12);
      --border-default: rgba(148,163,184,0.22);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --text-tertiary: #64748b;
      --accent: #6366f1;
      --accent-glow: rgba(99,102,241,0.3);
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --info: #3b82f6;
      --font-sans: 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background: radial-gradient(1000px 400px at 10% -10%, rgba(99,102,241,0.07), transparent 60%), var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Header ─── */
    .header {
      position: sticky; top: 0; z-index: 100;
      height: 64px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem;
      background: rgba(10,14,23,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border-subtle);
    }

    .brand {
      font-family: var(--font-mono);
      font-size: 1.1rem;
      font-weight: 700;
      display: flex; align-items: center; gap: 0.75rem;
    }
    .brand-logo {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem;
    }
    .brand-sep { color: var(--border-default); }

    .header-right { display: flex; align-items: center; gap: 1rem; }

    .tech-name {
      font-family: var(--font-mono);
      font-size: 0.875rem;
      color: var(--text-secondary);
      padding: 0.4rem 1rem;
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: 999px;
    }

    .btn-logout {
      padding: 0.4rem 1.1rem;
      background: transparent;
      border: 1px solid var(--border-default);
      border-radius: 8px;
      color: var(--text-secondary);
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 200ms;
    }
    .btn-logout:hover {
      border-color: var(--danger);
      color: var(--danger);
      background: rgba(239,68,68,0.08);
    }

    /* ─── Main ─── */
    .main { max-width: 1200px; margin: 0 auto; padding: 2rem; }

    .page-header { margin-bottom: 2rem; }
    .page-title { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }
    .page-subtitle { color: var(--text-secondary); margin-top: 0.4rem; }

    /* ─── Filtros ─── */
    .filtros {
      display: flex; gap: 0.5rem; flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .filtro-btn {
      padding: 0.45rem 1.1rem;
      border-radius: 999px;
      font-size: 0.813rem;
      font-weight: 600;
      font-family: var(--font-mono);
      cursor: pointer;
      border: 1px solid var(--border-default);
      background: transparent;
      color: var(--text-secondary);
      transition: all 200ms;
    }
    .filtro-btn:hover { color: var(--text-primary); background: var(--bg-tertiary); }
    .filtro-btn.active {
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      border-color: transparent;
      color: white;
      box-shadow: 0 4px 16px var(--accent-glow);
    }

    /* ─── Estadísticas rápidas ─── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .stat-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
      border: 1px solid var(--border-subtle);
      border-radius: 14px;
      padding: 1.2rem 1.5rem;
      display: flex; align-items: center; gap: 1rem;
      transition: all 200ms;
    }
    .stat-card:hover { border-color: var(--border-default); transform: translateY(-2px); }

    .stat-icon {
      width: 42px; height: 42px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .stat-info { display: flex; flex-direction: column; }
    .stat-num { font-size: 1.5rem; font-weight: 700; font-family: var(--font-mono); line-height: 1; }
    .stat-label { font-size: 0.75rem; color: var(--text-tertiary); margin-top: 0.2rem; font-weight: 500; }

    /* ─── Cards de solicitudes ─── */
    .solicitudes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1rem;
    }

    .solicitud-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
      border: 1px solid var(--border-subtle);
      border-radius: 16px;
      padding: 1.5rem;
      display: flex; flex-direction: column; gap: 1rem;
      transition: all 200ms;
      animation: fadeUp 0.3s ease-out;
    }
    .solicitud-card:hover {
      border-color: var(--border-default);
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
      transform: translateY(-2px);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* borde lateral por estado */
    .solicitud-card.pendiente   { border-left: 3px solid var(--warning); }
    .solicitud-card.en_proceso  { border-left: 3px solid var(--info); }
    .solicitud-card.finalizada  { border-left: 3px solid var(--success); }
    .solicitud-card.cancelada   { border-left: 3px solid var(--danger); opacity: 0.7; }

    .card-top {
      display: flex; justify-content: space-between; align-items: flex-start;
    }

    .solicitud-id {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-tertiary);
    }

    /* badges de estado */
    .estado-badge {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      font-weight: 700;
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .badge-pendiente  { background: rgba(245,158,11,0.15);  color: var(--warning); border: 1px solid rgba(245,158,11,0.35); }
    .badge-en_proceso { background: rgba(59,130,246,0.15);  color: var(--info);    border: 1px solid rgba(59,130,246,0.35); }
    .badge-finalizada { background: rgba(16,185,129,0.15);  color: var(--success); border: 1px solid rgba(16,185,129,0.35); }
    .badge-cancelada  { background: rgba(239,68,68,0.12);   color: var(--danger);  border: 1px solid rgba(239,68,68,0.3); }

    .card-body { display: flex; flex-direction: column; gap: 0.4rem; }

    .cliente-nombre {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-primary);
    }
    .cliente-correo {
      font-size: 0.813rem;
      color: var(--text-secondary);
    }

    .servicio-tag {
      display: inline-flex; align-items: center;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.25rem 0.75rem;
      border-radius: 6px;
      background: rgba(99,102,241,0.12);
      color: var(--accent);
      border: 1px solid rgba(99,102,241,0.25);
      width: fit-content;
      margin-top: 0.25rem;
    }

    .descripcion {
      font-size: 0.813rem;
      color: var(--text-secondary);
      line-height: 1.6;
      background: rgba(0,0,0,0.2);
      border-radius: 8px;
      padding: 0.75rem;
      border: 1px solid var(--border-subtle);
    }

    /* selector de estado */
    .estado-select-wrap { display: flex; flex-direction: column; gap: 0.4rem; }
    .estado-select-label {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .estado-select {
      background: var(--bg-secondary);
      border: 1px solid var(--border-default);
      border-radius: 10px;
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 0.875rem;
      font-weight: 500;
      padding: 0.6rem 1rem;
      cursor: pointer;
      outline: none;
      transition: all 200ms;
      width: 100%;
    }
    .estado-select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .btn-actualizar {
      width: 100%;
      padding: 0.7rem;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      border: none;
      border-radius: 10px;
      color: white;
      font-family: var(--font-sans);
      font-size: 0.875rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 200ms;
      box-shadow: 0 4px 16px var(--accent-glow);
    }
    .btn-actualizar:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px var(--accent-glow);
    }
    .btn-actualizar:active { transform: translateY(0); }
    .btn-actualizar:disabled {
      opacity: 0.5; cursor: not-allowed;
      transform: none; box-shadow: none;
    }

    /* ─── Empty / Loading ─── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-secondary);
    }
    .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
    .empty-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.5rem; }
    .empty-sub { font-size: 0.875rem; color: var(--text-tertiary); }

    .loading-spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border-default);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Toast ─── */
    #toast {
      position: fixed; bottom: 2rem; right: 2rem;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-default);
      border-radius: 14px;
      padding: 0.9rem 1.5rem;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-primary);
      z-index: 999;
      transform: translateY(40px);
      opacity: 0;
      transition: all 0.3s ease-out;
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.ok  { border-color: var(--success); }
    #toast.err { border-color: var(--danger); }

    /* ─── Responsive ─── */
    @media (max-width: 768px) {
      .main { padding: 1.25rem; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .solicitudes-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 480px) {
      .stats-row { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="brand">
      <div class="brand-logo">🔧</div>
      <span>TechForge</span>
      <span class="brand-sep">/</span>
      <span style="color:var(--text-secondary);font-weight:500">Técnico</span>
    </div>
    <div class="header-right">
      <span class="tech-name" id="techNombre">Cargando...</span>
      <button class="btn-logout" id="btnSalir">↻ Salir</button>
    </div>
  </header>

  <main class="main">

    <div class="page-header">
      <h1 class="page-title">Panel de trabajo</h1>
      <p class="page-subtitle">Gestiona y actualiza el estado de las solicitudes asignadas</p>
    </div>

    <!-- Stats -->
    <div class="stats-row" id="statsRow">
      <div class="stat-card">
        <div class="stat-icon" style="background:rgba(245,158,11,0.15);">⏳</div>
        <div class="stat-info">
          <span class="stat-num" id="statPendiente">—</span>
          <span class="stat-label">Pendientes</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:rgba(59,130,246,0.15);">🔧</div>
        <div class="stat-info">
          <span class="stat-num" id="statEnProceso">—</span>
          <span class="stat-label">En proceso</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:rgba(16,185,129,0.15);">✅</div>
        <div class="stat-info">
          <span class="stat-num" id="statFinalizada">—</span>
          <span class="stat-label">Finalizadas</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:rgba(239,68,68,0.12);">🚫</div>
        <div class="stat-info">
          <span class="stat-num" id="statCancelada">—</span>
          <span class="stat-label">Canceladas</span>
        </div>
      </div>
    </div>

    <!-- Filtros -->
    <div class="filtros">
      <button class="filtro-btn active" data-filtro="todas">Todas</button>
      <button class="filtro-btn" data-filtro="pendiente">⏳ Pendientes</button>
      <button class="filtro-btn" data-filtro="en_proceso">🔧 En proceso</button>
      <button class="filtro-btn" data-filtro="finalizada">✅ Finalizadas</button>
      <button class="filtro-btn" data-filtro="cancelada">🚫 Canceladas</button>
    </div>

    <!-- Grid de solicitudes -->
    <div class="solicitudes-grid" id="solicitudesGrid">
      <div class="empty-state">
        <div class="loading-spinner"></div>
        <p>Cargando solicitudes...</p>
      </div>
    </div>

  </main>

  <div id="toast"></div>

  <script src="tecnico.js"></script>
</body>
</html>
